version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: metroevents_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metroevents
      POSTGRES_USER: metrouser
      POSTGRES_PASSWORD: metropass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: metroevents_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metroevents_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metroevents_web
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    ports:
      - '3000:3000'

volumes:
  pgdata:
